<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архивный НРИ Стол</title>
    <style>
        /* === БАЗА И ИНТЕРФЕЙС === */
        body { margin: 0; padding: 0; background-color: #121212; font-family: 'Segoe UI', Arial, sans-serif; color: #e0e0e0; overflow: hidden; user-select: none; }
        
        /* Лобби */
        #lobby-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(18, 18, 18, 0.98); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .lobby-box { background: #18181b; padding: 25px; border-radius: 12px; border: 1px solid #bfa15f; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 360px; display: flex; flex-direction: column; gap: 12px; }
        .lobby-box h2 { text-align: center; color: #bfa15f; margin: 0 0 5px 0; font-size: 20px; }
        .lobby-box input, .lobby-box select { background: #27272a; border: 1px solid #52525b; color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .lobby-box button { background: #bfa15f; color: #121212; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; width: 100%;}
        .lobby-box button:hover { background: #d4af37; }
        .game-item { background: #27272a; border: 1px solid #3f3f46; padding: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; cursor: pointer;}
        .game-item.selected { border-color: #bfa15f; background: #3f3f46; }
        .games-list { max-height: 180px; overflow-y: auto; background: #111; padding: 5px; border-radius: 6px; border: 1px solid #27272a;}

        /* Верхняя Панель */
        .top-panel { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(24, 24, 27, 0.96); padding: 8px 15px; border-radius: 8px; border: 1px solid #3f3f46; display: flex; gap: 10px; align-items: center; z-index: 1000; box-shadow: 0 4px 25px rgba(0,0,0,0.7); }
        .panel-section { display: flex; align-items: center; gap: 5px; border-right: 1px solid #3f3f46; padding-right: 8px; }
        .panel-section:last-child { border-right: none; padding-right: 0; }
        
        select, button, input[type="number"] { background: #27272a; color: #f4f4f5; border: 1px solid #52525b; padding: 5px 7px; border-radius: 4px; cursor: pointer; font-size: 12px; outline: none; }
        select:hover, button:hover { background: #3f3f46; }
        button.active { background: #bfa15f; color: #121212; border-color: #d4af37; font-weight: bold; }
        
        .selection-box { position: absolute; border: 1px dashed #38bdf8; background: rgba(56, 189, 248, 0.15); pointer-events: none; z-index: 500; display: none; }

        /* ЛЕВАЯ БОКОВАЯ ПАНЕЛЬ */
        .left-sidebar { position: absolute; left: 15px; top: 15px; bottom: 15px; width: 175px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; pointer-events: none; }
        .sidebar-block { background: rgba(24, 24, 27, 0.96); border: 1px solid #3f3f46; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 6px; pointer-events: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .sidebar-block h4 { margin: 0; color: #bfa15f; font-size: 12px; text-align: center; border-bottom: 1px solid #3f3f46; padding-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .tools-grid { display: flex; flex-direction: column; gap: 4px; }
        .tools-grid button { width: 100%; text-align: left; padding: 6px 10px; }

        /* ПРАВАЯ БОКОВАЯ ПАНЕЛЬ */
        .right-sidebar { position: absolute; right: 15px; top: 15px; bottom: 15px; width: 175px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; pointer-events: none; }
        .right-sidebar .sidebar-block { pointer-events: auto; }
        .zoom-block-content { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 5px 0; }
        .zoom-slider-horiz { width: 100%; cursor: pointer; margin: 0; }
        
        /* Лог кубов */
        .dice-container { display: flex; flex-direction: column; gap: 5px; }
        .dice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .dice-grid button { padding: 5px 0; text-align: center; justify-content: center; font-weight: bold; font-size: 11px; }
        
        /* КРУПНЫЙ ЛОГ */
        .dice-log { background: #141416; border: 1px solid #3f3f46; overflow-y: auto; font-size: 13px; padding: 8px; border-radius: 4px; font-family: 'Segoe UI', sans-serif; color: #e4e4e7; }
        .dice-log p { margin: 6px 0; border-bottom: 1px solid #27272a; padding-bottom: 5px; line-height: 1.4; }
        .crit-max { color: #22c55e; font-weight: bold; background: rgba(34, 197, 94, 0.1); padding: 1px 3px; border-radius: 3px; }
        .crit-min { color: #ef4444; font-weight: bold; background: rgba(239, 68, 68, 0.1); padding: 1px 3px; border-radius: 3px; }
        .dm-tag { background: #bfa15f; color: #121212; font-weight: bold; padding: 1px 4px; border-radius: 3px; font-size: 10px; margin-right: 4px; display: inline-block; }

        /* Панель Игроков (Справа снизу) */
        .player-status-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #e4e4e7; padding: 2px 0; }
        .player-status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 6px #22c55e; }

        /* Игровое поле */
        #game-viewport { width: 100vw; height: 100vh; position: relative; background: #080808; overflow: hidden; }
        #table-surface { position: absolute; top: 0; left: 0; transform-origin: top left; will-change: transform; }
        #map-container { position: relative; display: inline-block; box-shadow: 0 0 40px rgba(0,0,0,0.9); }
        #game-map { display: block; width: 1200px; height: 800px; pointer-events: none; background: #27272a; object-fit: fill; z-index: 1; }
        
        /* Слои видимости */
        #ruler-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 500; }

        /* === ТОКЕНЫ И СТАТУСЫ === */
        .token { position: absolute; touch-action: none; box-sizing: border-box; }
        .token img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; display: block; position: relative; z-index: 3; }
        .token.selected img { filter: drop-shadow(0 0 10px #38bdf8) drop-shadow(0 0 2px #38bdf8); }

        .status-effects { position: absolute; top: 2px; right: 2px; display: flex; flex-direction: column; gap: 2px; z-index: 4; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #000; }
        .status-dot.dead { background: #ef4444; } 
        .status-dot.poisoned { background: #22c55e; } 
        .status-dot.stunned { background: #eab308; } 

        .aura { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; opacity: 0.25; pointer-events: none; z-index: 1; }
        
        .token.layer-item { z-index: 10 !important; }
        .token.layer-token { z-index: 20; }
        .token.layer-gm { z-index: 30; opacity: 0.5; }
        .token.layer-gm img { filter: drop-shadow(0 0 6px #a855f7); }

        /* Быстрые характеристики (Хиты, КЗ, Мана) над токеном */
        .token .quick-stats { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); display: none; gap: 4px; z-index: 100; pointer-events: auto; }
        .token.selected .quick-stats { display: flex; }
        .quick-stats input { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #38bdf8; background: rgba(24, 24, 27, 0.95); color: #fff; text-align: center; font-size: 10px; padding: 0; outline: none; box-shadow: 0 0 5px rgba(0,0,0,0.8); cursor: text; }
        .quick-stats input.qs-hp { border-color: #ef4444; }
        .quick-stats input.qs-ac { border-color: #bfa15f; }
        .quick-stats input.qs-mp { border-color: #3b82f6; }

        /* Класс для активного перетаскивания */
        .token.active-drag { z-index: 99999 !important; }

        .player-mode .token.layer-gm { display: none !important; }
        .player-mode .dm-only { display: none !important; }

        .dm-mode #map-container.active-layer-item .token:not(.layer-item) { pointer-events: none; }
        .dm-mode #map-container.active-layer-token .token:not(.layer-token) { pointer-events: none; }
        .dm-mode #map-container.active-layer-gm .token:not(.layer-gm) { pointer-events: none; }

        .token-info-container { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); z-index: 5; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .token-name { background: rgba(0,0,0,0.85); color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 11px; white-space: nowrap; border: 1px solid #52525b; }
        .token-hp-bar-container { width: 44px; height: 6px; background: #27272a; border: 1px solid #000; margin-top: 2px; border-radius: 2px; overflow: hidden; }
        .token-hp-bar { width: 100%; height: 100%; background: #22c55e; }

        /* Контекстное меню */
        .token-context-menu { position: absolute; background: rgba(24, 24, 27, 0.98); border: 1px solid #38bdf8; border-radius: 6px; padding: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); z-index: 2000; display: none; flex-direction: column; gap: 6px; width: 230px; cursor: default; }
        .token-context-menu label { font-size: 10px; color: #a1a1aa; margin-bottom: -2px; display: block;}
        .token-context-menu input, .token-context-menu select { background: #18181b; color: #fff; border: 1px solid #52525b; padding: 4px; border-radius: 3px; font-size: 12px; width: 100%; box-sizing: border-box; }
        .context-row { display: flex; gap: 5px; align-items: center; }
        .status-checkboxes { display: flex; gap: 10px; font-size: 11px; margin: 4px 0; }
        .status-checkboxes label { display: flex; align-items: center; gap: 3px; color: #fff; cursor: pointer; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <!-- МНОГОФУНКЦИОНАЛЬНОЕ ЛОББИ -->
    <div id="lobby-screen">
        <div class="lobby-box" id="lobby-step-1">
            <h2>Добро пожаловать</h2>
            <input type="text" id="player-nickname" placeholder="Ваше Имя" value="Игрок">
            <button onclick="switchLobbyStep('dm-auth')">Я Мастер (DM)</button>
            <button onclick="switchLobbyStep('player-join')" style="background: #3f3f46; color: white;">Я Игрок</button>
        </div>

        <div class="lobby-box" id="lobby-dm-auth" style="display:none;">
            <h2>Аккаунт Мастера</h2>
            <input type="text" id="dm-auth-user" placeholder="Логин Мастера">
            <input type="password" id="dm-auth-pass" placeholder="Пароль">
            <button onclick="handleDmAuth()" style="background:#22c55e; color:white;">Войти</button>
            <button onclick="switchLobbyStep('1')" style="background:transparent; color:#a1a1aa; font-size:11px;">Назад</button>
        </div>

        <div class="lobby-box" id="lobby-dm-dashboard" style="display:none; width: 400px;">
            <h2 id="dm-dashboard-title">Миры Мастера</h2>
            <div class="games-list" id="games-list-container"></div>
            <button onclick="openGameEditor(false)" style="background:#0f766e;">+ Создать мир</button>
            <div style="display:flex; gap: 5px;">
                <button onclick="openGameEditor(true)" style="background:#374151;">Изменить</button>
                <button id="btn-delete-game-dashboard" onclick="deleteGameClick()" style="background:#7f1d1d;">Удалить</button>
            </div>
            <hr style="border:0; border-top:1px solid #3f3f46; margin: 5px 0;">
            <button onclick="launchGameDM()" style="background:#bfa15f; color:#121212; font-size:16px; padding:12px;">Запустить Стол 🚀</button>
        </div>

        <div class="lobby-box" id="lobby-dm-edit" style="display:none;">
            <h2>Настройка Мира</h2>
            <input type="text" id="edit-game-name" placeholder="Название игры">
            <input type="text" id="edit-game-password" placeholder="Пароль для игроков">
            <button onclick="saveGameChanges()" style="background:#22c55e; color:white;">Сохранить</button>
            <button onclick="switchLobbyStep('dm-dashboard')" style="background:#3f3f46; color:white;">Отмена</button>
        </div>

        <div class="lobby-box" id="lobby-player-join" style="display:none;">
            <h2>Подключение к игре</h2>
            <select id="player-game-select"></select>
            <input type="password" id="player-room-password" placeholder="Пароль от комнаты">
            <button onclick="launchGamePlayer()">Войти в мир</button>
            <button onclick="switchLobbyStep('1')" style="background:transparent; color:#a1a1aa; font-size:11px;">Назад</button>
        </div>
    </div>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="top-panel">
        <div class="panel-section">
            <span style="font-size:11px; color:#a1a1aa;">Локация:</span>
            <span id="map-name-display" style="display:none; font-size:12px; font-weight:bold; color:#bfa15f; margin: 0 5px;"></span>
            <select id="map-selector" style="max-width:100px;" onchange="switchMap()"></select>
            <input type="file" id="map-library-upload" accept="image/*" style="display:none;">
            <button class="dm-only" style="background: #0f766e;" onclick="document.getElementById('map-library-upload').click()">+</button>
            <button class="dm-only" style="background: #374151;" onclick="renameCurrentMap()">✏️</button>
            <button class="dm-only" style="background: #7f1d1d;" onclick="deleteCurrentMap()">🗑️</button>
            <button class="dm-only" id="btn-ribbon" style="background: #bfa15f; color:#121212; font-weight:bold;" onclick="movePlayerRibbon()" title="Перенести игроков на эту карту">🚩 Игроки</button>
        </div>
        
        <div class="panel-section dm-only">
            <span style="font-size:11px; color:#a1a1aa;">Разм:</span>
            <input type="number" id="map-width-input" value="1200" style="width:45px;" oninput="applyMapSize()"> ×
            <input type="number" id="map-height-input" value="800" style="width:45px;" oninput="applyMapSize()">
        </div>

        <div class="panel-section dm-only">
            <select id="active-layer-select" onchange="changeActiveLayer()">
                <option value="token">Токены</option>
                <option value="item">Предметы</option>
                <option value="gm">GM (Скрыто)</option>
            </select>
        </div>

        <div class="panel-section">
            <select id="unit-system" onchange="updateUnitsUI()">
                <option value="ft">Футы</option>
                <option value="px">px</option>
            </select>
        </div>

        <div class="panel-section dm-only">
            <input type="file" id="token-upload" accept="image/*" style="display:none;">
            <button style="background: #22c55e; color: black;" onclick="document.getElementById('token-upload').click()">+ Токен</button>
        </div>
    </div>

    <!-- ЛЕВАЯ БОКОВАЯ ПАНЕЛЬ -->
    <div class="left-sidebar">
        <div class="sidebar-block">
            <h4>Инструменты</h4>
            <div class="tools-grid">
                <button id="btn-mode-select" class="active" onclick="setMode('select')">🖱️ Выбор</button>
                <button id="btn-mode-pan" onclick="setMode('pan')">🖐️ Камера</button>
                <button id="btn-mode-ruler" onclick="setMode('ruler')">📏 Линейка</button>
            </div>
            
            <div id="ruler-options" style="display:none; flex-direction:column; gap:4px; margin-top:5px; border-top:1px solid #3f3f46; padding-top:5px;">
                <label style="font-size:11px; color:#bfa15f;">Шаблон АОЕ:</label>
                <select id="ruler-shape" onchange="updateRulerShapeUI()">
                    <option value="line">📏 Линия</option>
                    <option value="sphere">🔮 Сфера (Радиус)</option>
                    <option value="cone">📐 Конус (Сектор)</option>
                </select>
                <div id="ruler-angle-container" style="display:none; justify-content:space-between; align-items:center; margin-top:3px;">
                    <label style="font-size:10px; color:#aaa;">Угол °:</label>
                    <input type="number" id="ruler-angle" value="60" style="width:55px; padding:2px;">
                </div>
            </div>
        </div>

        <div class="sidebar-block">
            <h4>🎲 Броски кубов</h4>
            <div class="dice-container">
                <div style="display:flex; gap:5px; justify-content:space-between;">
                    <label style="font-size: 10px;">К-во: <input type="number" id="dice-count" value="1" style="width:32px; padding:2px;"></label>
                    <label style="font-size: 10px;">Бонус: <input type="number" id="dice-bonus" value="0" style="width:35px; padding:2px;"></label>
                </div>
                <div class="dice-grid">
                    <button onclick="rollDice(4)">d4</button>
                    <button onclick="rollDice(6)">d6</button>
                    <button onclick="rollDice(8)">d8</button>
                    <button onclick="rollDice(10)">d10</button>
                    <button onclick="rollDice(12)">d12</button>
                    <button onclick="rollDice(20)" style="color:#bfa15f;">d20</button>
                </div>
            </div>
        </div>

        <div class="sidebar-block" style="flex: 1; min-height: 120px;">
            <h4>📜 Лог кубов <span style="cursor:pointer; color:#ef4444; float:right;" class="dm-only" onclick="clearDiceLog()">🧹</span></h4>
            <div class="dice-log" id="dice-log-box" style="height: calc(100% - 20px);"></div>
        </div>
    </div>

    <!-- ПРАВАЯ БОКОВАЯ ПАНЕЛЬ -->
    <div class="right-sidebar">
        <div class="sidebar-block">
            <h4>Масштаб</h4>
            <div class="zoom-block-content">
                <input type="range" id="zoomRangeSide" class="zoom-slider-horiz" min="0.15" max="4" step="0.05" value="1" oninput="changeZoomSlider(this.value)">
                <span id="zoomValueSide" style="font-size:11px; color:#bfa15f; white-space: nowrap;">100%</span>
            </div>
        </div>

        <!-- СПИСОК ИГРОКОВ -->
        <div class="sidebar-block" id="players-sidebar-block">
            <h4 onclick="togglePlayersPanel()" style="cursor:pointer; margin:0; display:flex; justify-content:space-between; width:100%;">
                <span>👥 Игроки (<span id="online-count">0</span>)</span>
                <span id="players-arrow">▼</span>
            </h4>
            <div id="players-online-list" style="display:none; margin-top:5px; max-height:200px; overflow-y:auto; flex-direction:column; gap:4px;"></div>
            <button id="invite-btn" style="margin-top:5px; width:100%; display:none; background:#38bdf8; color:#121212; font-size:11px;" onclick="copyInviteLink()">🔗 Пригласить друзей</button>
        </div>
    </div>

    <!-- НАСТРОЙКИ ТОКЕНА -->
    <div id="token-menu" class="token-context-menu" onmousedown="event.stopPropagation()">
        <div id="permissions-container-block" class="dm-only">
            <label style="color:#38bdf8; font-weight:bold; margin-bottom: 2px;">Контролируется:</label>
            <select id="ctx-owner-select" onchange="applyContextChanges()">
                <!-- Динамически заполняется только для Мастера -->
            </select>
            <hr style="border:0; border-top:1px solid #3f3f46; margin: 4px 0;">
        </div>

        <label>Имя токена</label>
        <input type="text" id="ctx-name" oninput="applyContextChanges()">
        
        <div class="context-row">
            <div style="flex:1;">
                <label style="color:#ef4444;">HP</label>
                <div class="context-row"><input type="number" id="ctx-hp" oninput="applyContextChanges()" style="width:40px;">/ <input type="number" id="ctx-max-hp" oninput="applyContextChanges()" style="width:40px;"></div>
            </div>
            <div style="flex:1;">
                <label style="color:#bfa15f;">КЗ (AC)</label>
                <input type="text" id="ctx-ac" oninput="applyContextChanges()">
            </div>
            <div style="flex:1;">
                <label style="color:#3b82f6;">Мана</label>
                <input type="text" id="ctx-mp" oninput="applyContextChanges()">
            </div>
        </div>

        <label id="lbl-size">Размер</label>
        <input type="number" id="ctx-size" oninput="applyContextChanges()">

        <label class="dm-only" style="color:#a855f7;">Слой</label>
        <select id="ctx-layer" class="dm-only" onchange="applyContextChanges()">
            <option value="item">Предмет</option>
            <option value="token">Токен</option>
            <option value="gm">GM (Скрыто)</option>
        </select>
        
        <label>Статусы</label>
        <div class="status-checkboxes">
            <label><input type="checkbox" id="status-dead" onchange="applyContextChanges()"> 💀</label>
            <label><input type="checkbox" id="status-poisoned" onchange="applyContextChanges()"> 🤢</label>
            <label><input type="checkbox" id="status-stunned" onchange="applyContextChanges()"> 💫</label>
        </div>

        <label style="color:#22c55e;" id="lbl-auras">Ауры (Радиус)</label>
        <div class="context-row"><input type="number" id="aura1-rad" placeholder="0" oninput="applyContextChanges()"><input type="color" id="aura1-col" value="#ff0000" onchange="applyContextChanges()"></div>
        <div class="context-row"><input type="number" id="aura2-rad" placeholder="0" oninput="applyContextChanges()"><input type="color" id="aura2-col" value="#00ff00" onchange="applyContextChanges()"></div>
        <div class="context-row"><input type="number" id="aura3-rad" placeholder="0" oninput="applyContextChanges()"><input type="color" id="aura3-col" value="#0000ff" onchange="applyContextChanges()"></div>
        
        <button id="btn-delete-token" onclick="deleteSelectedTokens()" style="background:#ef4444; color:#fff; font-size:11px; margin-top:4px; width:100%;">❌ Удалить</button>
    </div>

    <div id="selection-box" class="selection-box"></div>

    <div id="game-viewport" class="mode-select">
        <div id="table-surface">
            <div id="map-container" class="active-layer-token">
                <canvas id="ruler-canvas"></canvas>
                <img id="game-map" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200" alt="Карта">
            </div>
        </div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {

        function syncTokensOnly(serverTokens) {
            serverTokens.forEach(t => {
                let el = document.getElementById(t.id);
                if(!el) { createTokenDOM(t); el = document.getElementById(t.id); }
                if (el && !(el.classList.contains('selected') && isDraggingToken)) {
                    el.style.left = t.left + 'px'; el.style.top = t.top + 'px';
                    el.style.width = t.sizePx + 'px'; el.style.height = t.sizePx + 'px';
                    el.querySelector('.token-name').textContent = t.name;
                    
                    let parsedOwners = t.owners;
                    if (!parsedOwners || !Array.isArray(parsedOwners)) {
                        parsedOwners = (t.owner === 'all') ? ['all'] : (t.owner && t.owner !== 'none' ? [t.owner] : []);
                    }
                    el.dataset.owners = JSON.stringify(parsedOwners);
                    el.dataset.owner = t.owner || 'none';
                    
                    let hpVal = t.hp !== undefined ? t.hp : 10;
                    let maxHpVal = t.maxHp !== undefined ? t.maxHp : 10;

                    let pct = maxHpVal > 0 ? (hpVal / maxHpVal) * 100 : 0;
                    el.querySelector('.token-hp-bar').style.width = Math.min(Math.max(pct, 0), 100) + '%';
                    
                    el.dataset.hp = hpVal; el.dataset.maxHp = maxHpVal;
                    el.dataset.ac = t.ac || ''; el.dataset.mp = t.mp || '';
                    el.dataset.layer = t.layer;
                    el.dataset.auras = JSON.stringify(t.auras || [{},{},{}]);
                    
                    el.querySelector('.qs-hp').value = hpVal;
                    el.querySelector('.qs-ac').value = t.ac || '';
                    el.querySelector('.qs-mp').value = t.mp || '';

                    const sb = el.querySelector('.status-effects'); sb.innerHTML = '';
                    if(t.isDead) sb.innerHTML += '<div class="status-dot dead"></div>';
                    if(t.isPoisoned) sb.innerHTML += '<div class="status-dot poisoned"></div>';
                    if(t.isStunned) sb.innerHTML += '<div class="status-dot stunned"></div>';
                    
                    updateTokenAuraVisuals(el, JSON.parse(el.dataset.auras), t.sizePx);
                }
            });
            document.querySelectorAll('.token').forEach(el => { if(!serverTokens.find(t => t.id === el.id)) el.remove(); });
        }

        function syncActiveGameStorage() {
            if(!activeGame || !activeGame.maps[activeGame.currentMapIdx]) return;
            const cm = activeGame.maps[activeGame.currentMapIdx];
            
            // Сбор токенов
            const arr = [];
            document.querySelectorAll('.token').forEach(el => {
                const au = el.dataset.auras ? JSON.parse(el.dataset.auras) : [{},{},{}];
                let ownersList = [];
                try { ownersList = JSON.parse(el.dataset.owners || "[]"); } catch(e) {}
                
                arr.push({
                    id: el.id, name: el.querySelector('.token-name').textContent, src: el.querySelector('img').src,
                    left: parseFloat(el.style.left), top: parseFloat(el.style.top), sizePx: parseFloat(el.style.width),
                    hp: el.querySelector('.qs-hp').value !== '' ? parseInt(el.querySelector('.qs-hp').value) : (parseInt(el.dataset.hp)||0), 
                    maxHp: parseInt(el.dataset.maxHp)||10, 
                    ac: el.querySelector('.qs-ac').value || el.dataset.ac || '',
                    mp: el.querySelector('.qs-mp').value || el.dataset.mp || '',
                    layer: el.dataset.layer||'token',
                    owner: el.dataset.owner || 'none',
                    owners: ownersList,
                    isDead: !!el.querySelector('.status-dot.dead'), isPoisoned: !!el.querySelector('.status-dot.poisoned'), isStunned: !!el.querySelector('.status-dot.stunned'),
                    auras: au
                });
            });
            cm.tokens = arr;

            if (isHost) {
                cm.width = parseFloat(document.getElementById('game-map').style.width)||1200;
                cm.height = parseFloat(document.getElementById('game-map').style.height)||800;
                cm.gridSize = scaleUnitFactor;
                
                db.ref(`shared_games/${activeGame.id}/maps/${activeGame.currentMapIdx}`).set(cm);

            } else {
                db.ref(`shared_games/${activeGame.id}/maps/${activeGame.currentMapIdx}/tokens`).set(arr);
            }
            saveGamesToStorage();
        }

        function rollDice(f) {
            const c = parseInt(document.getElementById('dice-count').value)||1; const b = parseInt(document.getElementById('dice-bonus').value)||0;
            let s = 0; let str = [];
            for(let i=0; i<c; i++) { 
                let r = Math.floor(Math.random()*f)+1; 
                s+=r; 
                if(r===f) str.push(`<span class="crit-max">${r}</span>`); 
                else if(r===1) str.push(`<span class="crit-min">${r}</span>`); 
                else str.push(r); 
            }
            
            const logRef = db.ref(`shared_games/${activeGame.id}/dice_log`).push();
            logRef.set({
                user: localNickname,
                isDm: isHost,
                text: `${c}d${f}${b?(' + '+b):''}`,
                detail: `[${str.join(', ')}]`,
                result: s + b,
                time: firebase.database.ServerValue.TIMESTAMP
            });
        }

        }
        function updateRulerShapeUI() {
            const s = document.getElementById('ruler-shape').value;
            document.getElementById('ruler-angle-container').style.display = (s === 'cone') ? 'flex' : 'none';
            resetRulerCanvas();
        }
        function resetRulerCanvas() { rCtx.clearRect(0, 0, rulerCanvas.width, rulerCanvas.height); }

        document.getElementById('token-upload').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const r = new FileReader(); r.onload = function(ev) {
                let tl = isHost ? document.getElementById('active-layer-select').value : 'token';
                createTokenDOM({ 
                    id: 't_'+Date.now(), name: "Токен", src: ev.target.result, 
                    left: Math.abs(surfaceX/cameraZoom)+200, top: Math.abs(surfaceY/cameraZoom)+200, sizePx: 40, 
                    hp: 10, maxHp: 10, ac: '', mp: '', layer: tl, owner: 'none', owners: [], 
                    auras: [{}, {}, {}] 
                });
                syncActiveGameStorage();
            }; r.readAsDataURL(file);
        });

        function createTokenDOM(d) {
            const t = document.createElement('div'); t.className = `token layer-${d.layer}`; t.id = d.id;
            t.innerHTML = `
                <div class="quick-stats">
                    <input type="text" class="qs-hp" placeholder="HP" title="Хиты">
                    <input type="text" class="qs-ac" placeholder="AC" title="КЗ">
                    <input type="text" class="qs-mp" placeholder="MP" title="Мана">
                </div>
                <div class="aura aura-1"></div><div class="aura aura-2"></div><div class="aura aura-3"></div>
                <div class="status-effects"></div><img>
                <div class="token-info-container"><div class="token-name"></div><div class="token-hp-bar-container"><div class="token-hp-bar"></div></div></div>
            `;
            mapContainer.appendChild(t); t.querySelector('img').src = d.src;
            updateTokenVisuals(t, d); setupTokenEvents(t);
        }

        function updateTokenAuraVisuals(el, auras, sizePx) {
            for (let i = 0; i < 3; i++) {
                const aEl = el.querySelector('.aura-' + (i+1));
                if (aEl && auras && auras[i] && auras[i].rPx > 0) {
                    const dim = (auras[i].rPx * 2) + sizePx; 
                    aEl.style.width = dim+'px'; aEl.style.height = dim+'px'; 
                    aEl.style.backgroundColor = auras[i].c; aEl.style.display = 'block';
                } else if (aEl) {
                    aEl.style.display = 'none';
                }
            }
        }

        function updateTokenVisuals(el, d) {
            el.className = `token layer-${d.layer} ${el.classList.contains('selected') ? 'selected' : ''}`;
            el.style.left = d.left + 'px'; el.style.top = d.top + 'px'; el.style.width = d.sizePx + 'px'; el.style.height = d.sizePx + 'px';
            el.querySelector('.token-name').textContent = d.name;
            
            el.dataset.owners = JSON.stringify(d.owners || (d.owner === 'all' ? ['all'] : (d.owner && d.owner !== 'none' ? [d.owner] : [])));
            el.dataset.owner = d.owner || 'none';
            
            let pct = d.maxHp > 0 ? (d.hp / d.maxHp) * 100 : 0; el.querySelector('.token-hp-bar').style.width = Math.min(Math.max(pct, 0), 100) + '%';
            
            el.dataset.hp = d.hp; el.dataset.maxHp = d.maxHp; 
            el.dataset.ac = d.ac || ''; el.dataset.mp = d.mp || '';
            el.dataset.layer = d.layer;
            el.dataset.auras = JSON.stringify(d.auras || [{},{},{}]);

            el.querySelector('.qs-hp').value = d.hp !== undefined ? d.hp : '';
            el.querySelector('.qs-ac').value = d.ac || '';
            el.querySelector('.qs-mp').value = d.mp || '';

            const sb = el.querySelector('.status-effects'); sb.innerHTML = '';
            if(d.isDead) sb.innerHTML += '<div class="status-dot dead"></div>';
            if(d.isPoisoned) sb.innerHTML += '<div class="status-dot poisoned"></div>';
            if(d.isStunned) sb.innerHTML += '<div class="status-dot stunned"></div>';

            updateTokenAuraVisuals(el, d.auras, d.sizePx);
        }

        function openTokenContextMenu(t) {
            if(!hasControl(t)) return;
            
            document.body.appendChild(tokenMenu);
            tokenMenu.style.display = 'flex';
            
            const tRect = t.getBoundingClientRect();
            
            tokenMenu.style.left = (tRect.left + tRect.width / 2) + 'px';
            tokenMenu.style.top = (tRect.bottom + 5) + 'px';
            tokenMenu.style.transform = 'translateX(-50%)';

            const au = t.dataset.auras ? JSON.parse(t.dataset.auras) : [{},{},{}];
            
            renderPermissionsSelect(t);
            
            document.getElementById('ctx-name').value = t.querySelector('.token-name').textContent;
            document.getElementById('ctx-hp').value = t.dataset.hp || 10; 
            document.getElementById('ctx-max-hp').value = t.dataset.maxHp || 10;
            document.getElementById('ctx-ac').value = t.dataset.ac || '';
            document.getElementById('ctx-mp').value = t.dataset.mp || '';

            document.getElementById('ctx-size').value = fromPx(parseFloat(t.style.width)||40);
            if(isHost) document.getElementById('ctx-layer').value = t.dataset.layer || 'token';
            
            document.getElementById('status-dead').checked = !!t.querySelector('.status-dot.dead');
            document.getElementById('status-poisoned').checked = !!t.querySelector('.status-dot.poisoned');
            document.getElementById('status-stunned').checked = !!t.querySelector('.status-dot.stunned');
            
            for(let i=0; i<3; i++) {
                document.getElementById(`aura${i+1}-rad`).value = fromPx(au[i]?.rPx || 0); 
                document.getElementById(`aura${i+1}-col`).value = au[i]?.c || (i===0?'#ff0000':(i===1?'#00ff00':'#0000ff'));
            }

            if(!isHost) {
                document.getElementById('btn-delete-token').style.display = 'none';
            } else {
                document.getElementById('btn-delete-token').style.display = 'block';
            }
        }

        function applyContextChanges() {
            if (selectedTokens.length === 0) return;
            selectedTokens.forEach(el => {
                let ownersList = [];
                if (isHost) {
                    const selVal = document.getElementById('ctx-owner-select').value;
                    if (selVal === 'none') ownersList = [];
                    else if (selVal === 'all') ownersList = ['all'];
                    else ownersList = [selVal];
                } else {
                    try { ownersList = JSON.parse(el.dataset.owners || "[]"); } catch(e) {}
                }

                let d = {
                    id: el.id, name: document.getElementById('ctx-name').value,
                    hp: parseInt(document.getElementById('ctx-hp').value)||0, 
                    maxHp: parseInt(document.getElementById('ctx-max-hp').value)||0,
                    ac: document.getElementById('ctx-ac').value,
                    mp: document.getElementById('ctx-mp').value,
                    sizePx: toPx(parseFloat(document.getElementById('ctx-size').value)||40),
                    owner: ownersList.includes('all') ? 'all' : (ownersList[0] || 'none'),
                    owners: ownersList,
                    isDead: document.getElementById('status-dead').checked, isPoisoned: document.getElementById('status-poisoned').checked, isStunned: document.getElementById('status-stunned').checked,
                    layer: isHost ? document.getElementById('ctx-layer').value : 'token',
                    auras: [
                        { rPx: toPx(parseFloat(document.getElementById('aura1-rad').value)||0), c: document.getElementById('aura1-col').value },
                        { rPx: toPx(parseFloat(document.getElementById('aura2-rad').value)||0), c: document.getElementById('aura2-col').value },
                        { rPx: toPx(parseFloat(document.getElementById('aura3-rad').value)||0), c: document.getElementById('aura3-col').value }
                    ]
                };
                updateTokenVisuals(el, d);
            });
            syncActiveGameStorage();
        }

        function deleteSelectedTokens() { 
            if (!isHost) return; 
            selectedTokens.forEach(el => el.remove()); 
            deselectAllTokens(); 
            syncActiveGameStorage(); 
        }

        function deselectAllTokens() { 
            tokenMenu.style.display = 'none'; 
            selectedTokens.forEach(t => t.classList.remove('selected')); 
            selectedTokens = []; 
        }

        document.addEventListener('keydown', (e) => { 
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;

            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedTokens.length > 0) {
                    deleteSelectedTokens(); 
                }
            }
            
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
                if (selectedTokens.length > 0) {
                    copiedTokens = selectedTokens.map(el => {
                        const au = el.dataset.auras ? JSON.parse(el.dataset.auras) : [{},{},{}];
                        let ownersList = [];
                        try { ownersList = JSON.parse(el.dataset.owners || "[]"); } catch(e) {}
                        return {
                            name: el.querySelector('.token-name').textContent,
                            src: el.querySelector('img').src,
                            sizePx: parseFloat(el.style.width),
                            hp: parseInt(el.dataset.hp)||10,
                            maxHp: parseInt(el.dataset.maxHp)||10,
                            ac: el.dataset.ac || '',
                            mp: el.dataset.mp || '',
                            layer: el.dataset.layer||'token',
                            owner: el.dataset.owner || 'none',
                            owners: ownersList,
                            isDead: !!el.querySelector('.status-dot.dead'),
                            isPoisoned: !!el.querySelector('.status-dot.poisoned'),
                            isStunned: !!el.querySelector('.status-dot.stunned'),
                            auras: au
                        };
                    });
                }
            }

            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
                if (copiedTokens.length > 0 && isHost) { 
                    copiedTokens.forEach((tData, index) => {
                        const offset = index * 20; 
                        const pasteX = cursorOnMapX + offset;
                        const pasteY = cursorOnMapY + offset;
                        
                        const newTokenData = {
                            ...tData,
                            id: 't_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            left: pasteX,
                            top: pasteY
                        };
                        createTokenDOM(newTokenData);
                    });
                    syncActiveGameStorage();
                }
            }
        });

        let isDraggingToken = false, isPanning = false, isSelecting = false, isRuling = false;
        let startX, startY, startSurfX, startSurfY, dragOffsets = [];

        function setupTokenEvents(t) {
            t.addEventListener('mousedown', function(e) {
                if (currentMode !== 'select' || e.button !== 0) return;
                if (!hasControl(t)) return;
                
                e.stopPropagation();
                document.querySelectorAll('.token.active-drag').forEach(tok => tok.classList.remove('active-drag'));
                
                if (!selectedTokens.includes(t)) { deselectAllTokens(); t.classList.add('selected'); selectedTokens.push(t); }
                isDraggingToken = true;
                t.classList.add('active-drag');
                
                const mX = e.clientX / cameraZoom; const mY = e.clientY / cameraZoom;
                dragOffsets = selectedTokens.map(tok => ({ el: tok, ox: mX - parseFloat(tok.style.left), oy: mY - parseFloat(tok.style.top) }));
            });
            
            t.addEventListener('dblclick', (e) => { e.stopPropagation(); openTokenContextMenu(t); });

            t.querySelectorAll('.quick-stats input').forEach(inp => {
                inp.addEventListener('mousedown', e => e.stopPropagation());
                inp.addEventListener('change', e => {
                    t.dataset.hp = t.querySelector('.qs-hp').value;
                    t.dataset.ac = t.querySelector('.qs-ac').value;
                    t.dataset.mp = t.querySelector('.qs-mp').value;
                    syncActiveGameStorage();
                });
            });
        }

        viewport.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return; const rect = mapContainer.getBoundingClientRect();

            if (currentMode === 'pan') { isPanning = true; startX = e.clientX; startY = e.clientY; startSurfX = surfaceX; startSurfY = surfaceY; }
            else if (currentMode === 'select' && e.target !== tokenMenu && !tokenMenu.contains(e.target)) { deselectAllTokens(); isSelecting = true; startX = e.clientX; startY = e.clientY; selectionBox.style.left = startX+'px'; selectionBox.style.top = startY+'px'; selectionBox.style.width = '0px'; selectionBox.style.height = '0px'; selectionBox.style.display = 'block'; }
            else if (currentMode === 'ruler') { isRuling = true; startX = (e.clientX - rect.left) / cameraZoom; startY = (e.clientY - rect.top) / cameraZoom; }
        });

        document.addEventListener('mousemove', function(e) {
            const rect = mapContainer.getBoundingClientRect();
            
            cursorOnMapX = (e.clientX - rect.left) / cameraZoom;
            cursorOnMapY = (e.clientY - rect.top) / cameraZoom;

            if (isDraggingToken && currentMode === 'select') {
                const mX = e.clientX / cameraZoom; const mY = e.clientY / cameraZoom;
                dragOffsets.forEach(pos => { pos.el.style.left = (mX - pos.ox) + 'px'; pos.el.style.top = (mY - pos.oy) + 'px'; });
            } else if (isPanning) {
                surfaceX = startSurfX + (e.clientX - startX); surfaceY = startSurfY + (e.clientY - startY); updateTransform();
            } else if (isSelecting) {
                selectionBox.style.left = Math.min(startX, e.clientX) + 'px'; selectionBox.style.top = Math.min(startY, e.clientY) + 'px';
                selectionBox.style.width = Math.abs(startX - e.clientX) + 'px'; selectionBox.style.height = Math.abs(startY - e.clientY) + 'px';
                const boxRect = selectionBox.getBoundingClientRect();
                document.querySelectorAll('.token').forEach(t => {
                    if (!hasControl(t)) return;
                    const tRect = t.getBoundingClientRect(); const overlap = !(tRect.right<boxRect.left || tRect.left>boxRect.right || tRect.bottom<boxRect.top || tRect.top>boxRect.bottom);
                    if (overlap && !selectedTokens.includes(t)) { t.classList.add('selected'); selectedTokens.push(t); }
                    else if (!overlap && selectedTokens.includes(t)) { t.classList.remove('selected'); selectedTokens = selectedTokens.filter(x => x !== t); }
                });
            } else if (isRuling) {
                const curX = (e.clientX - rect.left) / cameraZoom; const curY = (e.clientY - rect.top) / cameraZoom;
                rCtx.clearRect(0, 0, rulerCanvas.width, rulerCanvas.height);
                
                const shape = document.getElementById('ruler-shape').value;
                const distPx = Math.sqrt(Math.pow(curX - startX, 2) + Math.pow(curY - startY, 2));
                const text = systemUnit === 'ft' ? `${fromPx(distPx)} ft` : `${Math.round(distPx)} px`;
                
                rCtx.strokeStyle = '#bfa15f'; rCtx.lineWidth = 3 / cameraZoom;
                
                if (shape === 'line') {
                    rCtx.beginPath(); rCtx.moveTo(startX, startY); rCtx.lineTo(curX, curY); rCtx.stroke();
                } else if (shape === 'sphere') {
                    rCtx.beginPath(); rCtx.arc(startX, startY, distPx, 0, Math.PI * 2); rCtx.stroke();
                    rCtx.fillStyle = 'rgba(191, 161, 95, 0.12)'; rCtx.fill();
                    rCtx.beginPath(); rCtx.moveTo(startX, startY); rCtx.lineTo(curX, curY); rCtx.strokeStyle = 'rgba(191, 161, 95, 0.4)'; rCtx.stroke();
                } else if (shape === 'cone') {
                    const baseAngle = Math.atan2(curY - startY, curX - startX);
                    const spreadDeg = parseFloat(document.getElementById('ruler-angle').value) || 60;
                    const spreadRad = (spreadDeg * Math.PI) / 180;
                    const startAngle = baseAngle - spreadRad / 2;
                    const endAngle = baseAngle + spreadRad / 2;
                    
                    rCtx.beginPath(); rCtx.moveTo(startX, startY);
                    rCtx.arc(startX, startY, distPx, startAngle, endAngle);
                    rCtx.closePath(); rCtx.stroke();
                    rCtx.fillStyle = 'rgba(191, 161, 95, 0.12)'; rCtx.fill();
                }
                
                rCtx.fillStyle = '#fff'; rCtx.font = `bold ${15 / cameraZoom}px Arial`;
                rCtx.fillText(text, curX + 10, curY - 10);
            }
        });

        document.addEventListener('mouseup', function(e) {
            if(isDraggingToken) { 
                isDraggingToken = false; 
                document.querySelectorAll('.token.active-drag').forEach(t => t.classList.remove('active-drag'));
                syncActiveGameStorage(); 
            }
            if (isPanning) isPanning = false; 
            if (isSelecting) { isSelecting = false; selectionBox.style.display = 'none'; }
            if (isRuling) { isRuling = false; resetRulerCanvas(); }
        });

        viewport.addEventListener('wheel', function(e) { e.preventDefault(); cameraZoom = Math.min(Math.max(cameraZoom + (e.deltaY < 0 ? 0.07 : -0.07), 0.15), 4); document.getElementById('zoomRangeSide').value = cameraZoom; document.getElementById('zoomValueSide').textContent = Math.round(cameraZoom * 100) + '%'; updateTransform(); }, { passive: false });
        function updateTransform() { surface.style.transform = `translate(${surfaceX}px, ${surfaceY}px) scale(${cameraZoom})`; }
        setTimeout(() => { surfaceX = (window.innerWidth - 1200)/2 - 80; surfaceY = 60; updateTransform(); resizeRulerCanvas(); }, 150);
    </script>
</body>
</html>
