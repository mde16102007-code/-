<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ультимативная VTT Комната</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <style>
        :root { --bg-dark: #0f1015; --panel-bg: #161822; --border-color: #242736; --accent: #ff4757; --text-main: #e2e8f0; --text-muted: #718096; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #auth-screen { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(10,11,15,0.95); z-index:9999; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(10px); }
        .auth-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        .form-group { text-align: left; margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
        .form-control { width: 100%; background: #1e2230; border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 14px; color: #fff; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: #242736; color: var(--text-main); margin-top: 10px; }
        
        #app-header { height: 50px; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; }
        #workspace { flex: 1; display: flex; position: relative; overflow: hidden; }
        
        #toolbar { position: absolute; left: 20px; top: 20px; background: var(--panel-bg); border: 1px solid var(--border-color); padding: 6px; border-radius: 8px; display: flex; flex-direction: column; gap: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; }
        .tool-btn { width: 38px; height: 38px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; }
        .tool-btn.active { background: var(--accent); color: #fff; }
        
        #board-wrapper { flex: 1; position: relative; background: #0b0c10; overflow: hidden; cursor: grab; }
        #board-wrapper:active { cursor: grabbing; }
        #game-board { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #game-map { display: block; background: #14161f; pointer-events: none; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        #lighting-canvas { z-index: 2; mix-blend-mode: multiply; }
        #ruler-canvas { z-index: 45; }
        
        #sidebar { width: 320px; background: var(--panel-bg); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 5; }
        .tabs-header { display: flex; border-bottom: 1px solid var(--border-color); background: #12141d; }
        .tab-btn { flex: 1; padding: 14px 0; text-align: center; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--panel-bg); }
        .tab-content { flex: 1; display: none; padding: 15px; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; gap: 12px; }
        
        .token { position: absolute; border-radius: 50%; cursor: move; z-index: 10; border: 2px solid #fff; background-size: cover; background-position: center; }
        .token.selected { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); z-index: 40; }
        .token-label { position: absolute; bottom: -22px; background: rgba(10,11,15,0.85); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; left: 50%; transform: translateX(-50%); border: 1px solid var(--border-color); }
        .token-hp-bar { position: absolute; top: -10px; left: 0; width: 100%; height: 5px; background: rgba(0,0,0,0.5); border-radius: 3px; overflow: hidden; }
        .token-hp-fill { height: 100%; width: 100%; transition: background 0.3s, width 0.3s; }
        
        #chat-log { flex: 1; background: #11131a; border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 6px; min-height: 180px; }
        .chat-msg { background: #181b26; padding: 6px 10px; border-radius: 6px; border-left: 3px solid var(--accent); }
        .dice-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        
        #context-menu { position: fixed; background: var(--panel-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; z-index: 1000; display: none; width: 220px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>VTT ULTIMATE</h1>
            <p>Подключение к игровой сессии</p>
            <div class="form-group" style="margin-top: 15px;">
                <label>Ваш Никнейм</label>
                <input type="text" id="auth-name" class="form-control" placeholder="Имя игрока">
            </div>
            <div class="form-group">
                <label>ID Комнаты</label>
                <input type="text" id="auth-room" class="form-control" placeholder="Оставьте пустым для новой">
            </div>
            <div class="form-group" id="recent-rooms-box" style="display:none;">
                <label>Ваши недавние комнаты</label>
                <select id="select-recent-rooms" class="form-control">
                    <option value="">-- Выберите из истории --</option>
                </select>
            </div>
            <button id="btn-join-player" class="btn btn-primary">⚔️ Войти как Игрок</button>
            <button id="btn-create-host" class="btn btn-secondary">👑 Создать как Мастер</button>
        </div>
    </div>

    <div id="app-header">
        <div><strong>VTT ULTIMATE</strong></div>
        <div id="room-display-id">Комната: <strong>---</strong></div>
    </div>

    <div id="workspace">
        <div id="toolbar">
            <button class="tool-btn active" data-tool="select" title="Выбор и перемещение">✋</button>
            <button class="tool-btn" data-tool="ruler" title="Линейка расстояний (5фт = 20px)">📏</button>
            <button class="tool-btn gm-only hidden" data-tool="wall" title="Рисовать Стены">🧱</button>
            <button class="tool-btn gm-only hidden" data-tool="light" title="Поставить Свет">💡</button>
        </div>

        <div id="board-wrapper">
            <div id="game-board">
                <img id="game-map" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='800'><rect width='1200' height='800' fill='%2314161f'/></svg>">
                <canvas id="lighting-canvas"></canvas>
                <canvas id="ruler-canvas"></canvas>
                <div id="tokens-container"></div>
            </div>
        </div>

        <div id="sidebar">
            <div class="tabs-header">
                <div class="tab-btn active" data-tab="maps">Карта</div>
                <div class="tab-btn" data-tab="tokens">Токены</div>
                <div class="tab-btn" data-tab="chat">Кубы</div>
            </div>

            <!-- ВКЛАДКА КАРТЫ -->
            <div class="tab-content active" id="tab-maps">
                <div id="gm-map-controls" style="display:none; flex-direction:column; gap:10px;">
                    <label style="font-size:11px; color:var(--text-muted);">ЗАГРУЗКА ФОНА КАРТЫ</label>
                    <input type="file" id="file-map-upload" class="form-control" accept="image/*">
                    
                    <div style="display:flex; gap:6px; margin-top:5px;">
                        <div class="form-group" style="flex:1;">
                            <label>Ширина карты (px)</label>
                            <input type="number" id="input-map-w" class="form-control" value="1200">
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Высота карты (px)</label>
                            <input type="number" id="input-map-h" class="form-control" value="800">
                        </div>
                    </div>
                    <button id="btn-save-map-settings" class="btn btn-primary">Применить размеры</button>
                    <hr style="border-color:var(--border-color); margin:5px 0;">
                    <button id="btn-clear-walls" class="btn btn-secondary" style="background:#3a2424; color:#ff4757; margin-top:0;">🗑️ Удалить стены/свет</button>
                </div>
                <div id="player-map-status" style="color:var(--text-muted); font-size:13px;">Размеры и освещение контролируются Мастером.</div>
            </div>

            <!-- ВКЛАДКА ТОКЕНЫ -->
            <div class="tab-content" id="tab-tokens">
                <div class="gm-only hidden">
                    <label style="font-size:11px; color:var(--text-muted);">ЗАГРУЗИТЬ ТОКЕН (ФАЙЛ)</label>
                    <input type="file" id="file-token-upload" class="form-control" accept="image/*" style="margin-bottom:8px;">
                </div>
                
                <label style="font-size:11px; color:var(--text-muted);">БЫСТРЫЙ СПАВН</label>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:6px;">
                    <button class="btn btn-secondary spawn-token-btn" data-name="Герой" data-img="https://i.imgur.com/7b2eX9F.png" style="margin-top:0;">🛡️ Герой</button>
                    <button class="btn btn-secondary spawn-token-btn" data-name="Враг" data-img="https://i.imgur.com/N7Wb8p6.png" style="margin-top:0;">👹 Враг</button>
                    <button class="btn btn-secondary spawn-token-btn" data-name="НПС" data-img="https://i.imgur.com/vHqY7bM.png" style="margin-top:0;">🧙 НПС</button>
                </div>
                <div style="margin-top:10px; font-size:12px; color:var(--text-muted)">В сети:</div>
                <div id="players-list" style="font-size:13px;"></div>
            </div>

            <!-- ВКЛАДКА КУБЫ -->
            <div class="tab-content" id="tab-chat">
                <div class="dice-grid">
                    <button class="btn btn-secondary d-btn" data-dice="4" style="margin-top:0;">D4</button>
                    <button class="btn btn-secondary d-btn" data-dice="6" style="margin-top:0;">D6</button>
                    <button class="btn btn-secondary d-btn" data-dice="8" style="margin-top:0;">D8</button>
                    <button class="btn btn-secondary d-btn" data-dice="10" style="margin-top:0;">D10</button>
                    <button class="btn btn-secondary d-btn" data-dice="12" style="margin-top:0;">D12</button>
                    <button class="btn btn-secondary d-btn" data-dice="20" style="margin-top:0;">D20</button>
                    <button class="btn btn-secondary d-btn" data-dice="100" style="margin-top:0;">D100</button>
                </div>
                <button id="btn-clear-chat" class="btn btn-secondary" style="background:#3a2424; color:#ff4757; font-size:11px; padding:6px; margin-top:0;">🗑️ Очистить чат</button>
                <div id="chat-log"></div>
                <input type="text" id="chat-input" class="form-control" placeholder="Сообщение...">
            </div>
        </div>
    </div>

    <!-- КОНТЕКСТНОЕ МЕНЮ ТОКЕНА -->
    <div id="context-menu">
        <div id="ctx-title" style="font-weight:700; margin-bottom:8px; font-size:13px;">Параметры токена</div>
        <div class="form-group">
            <label>Имя токена</label>
            <input type="text" id="ctx-token-name" class="form-control">
        </div>
        <div class="form-group">
            <label>Размер (px)</label>
            <input type="number" id="ctx-token-size" class="form-control" value="40">
        </div>
        <div class="form-group">
            <label>Хитпоинты (Тек / Макс)</label>
            <div style="display:flex; gap:4px;">
                <input type="number" id="ctx-hp-val" class="form-control">
                <input type="number" id="ctx-hp-max" class="form-control">
            </div>
        </div>
        <button id="ctx-save-btn" class="btn btn-primary" style="padding:8px; font-size:12px; margin-bottom:4px;">Сохранить</button>
        <button id="ctx-delete-item" class="btn btn-secondary" style="padding:8px; font-size:12px; background:#ff4757; color:#fff; margin-top:0;">Удалить</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6SbXuWwTo4V1Ys5uvoPdrb64WRyITiWc",
            authDomain: "nrii-803a6.firebaseapp.com",
            databaseURL: "https://nrii-803a6-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "nrii-803a6",
            storageBucket: "nrii-803a6.firebasestorage.app",
            messagingSenderId: "463054037338",
            appId: "1:463054037338:web:f572c17cdccc0f229dd363",
            measurementId: "G-6KPY4NZ603"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();

        let roomId = ''; let userId = ''; let userName = 'Игрок'; let isHost = false;
        let currentTool = 'select'; let selectedTokenId = null;
        let panX = 0; let panY = 0; let scale = 1; let isPanning = false;
        let startX = 0; let startY = 0;
        let rulerStart = null; let rulerEnd = null;
        let wallStart = null;
        let walls = []; let lights = [];

        const boardWrapper = document.getElementById('board-wrapper');
        const gameBoard = document.getElementById('game-board');
        const mapImg = document.getElementById('game-map');
        const lightingCanvas = document.getElementById('lighting-canvas');
        const rulerCanvas = document.getElementById('ruler-canvas');
        const tokensContainer = document.getElementById('tokens-container');
        const contextMenu = document.getElementById('context-menu');

        // История комнат в localStorage
        function loadRecentRooms() {
            let rooms = JSON.parse(localStorage.getItem('vtt_recent_rooms') || '[]');
            const select = document.getElementById('select-recent-rooms');
            const box = document.getElementById('recent-rooms-box');
            if (rooms.length > 0) {
                box.style.display = 'block';
                select.innerHTML = '<option value="">-- Выберите комнату --</option>' + rooms.map(r => `<option value="${r}">${r}</option>`).join('');
                select.onchange = () => { if(select.value) document.getElementById('auth-room').value = select.value; };
            }
        }
        function saveRecentRoom(id) {
            let rooms = JSON.parse(localStorage.getItem('vtt_recent_rooms') || '[]');
            if (!rooms.includes(id)) {
                rooms.unshift(id);
                if (rooms.length > 5) rooms.pop();
                localStorage.setItem('vtt_recent_rooms', JSON.stringify(rooms));
            }
        }
        loadRecentRooms();

        document.getElementById('btn-create-host').addEventListener('click', () => { proceedAuth(true); });
        document.getElementById('btn-join-player').addEventListener('click', () => { proceedAuth(false); });

        function proceedAuth(hostFlag) {
            const nameInput = document.getElementById('auth-name').value.trim();
            const roomInput = document.getElementById('auth-room').value.trim();
            if (!nameInput) return alert('Введите имя');
            userName = nameInput; isHost = hostFlag;
            userId = 'usr_' + Math.random().toString(36).substr(2, 9);
            roomId = roomInput || 'rm_' + Math.random().toString(36).substr(2, 6);
            
            saveRecentRoom(roomId);
            if (isHost) {
                database.ref('sessions/' + roomId).update({ hostId: userId, mapWidth: 1200, mapHeight: 800 });
            }
            runVTT();
        }

        function runVTT() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('room-display-id').innerHTML = `Комната: <strong>${roomId}</strong>`;
            
            if (isHost) { 
                document.getElementById('gm-map-controls').style.display = 'flex';
                document.getElementById('player-map-status').style.display = 'none';
                document.querySelectorAll('.gm-only').forEach(el => el.classList.remove('hidden'));
            }
            
            database.ref(`sessions/${roomId}/players/${userId}`).set({ name: userName, isHost: isHost });
            database.ref(`sessions/${roomId}/players/${userId}`).onDisconnect().remove();

            initDatabaseListeners();
            initEngineCoreUI();
        }

        function initDatabaseListeners() {
            database.ref(`sessions/${roomId}/players`).on('value', s => {
                const plist = document.getElementById('players-list'); plist.innerHTML = '';
                if(s.exists()) { Object.values(s.val()).forEach(p => { plist.innerHTML += `<div>${p.isHost ? '👑' : '⚔️'} ${p.name}</div>`; }); }
            });

            database.ref(`sessions/${roomId}`).on('value', s => {
                const data = s.val(); if(!data) return;
                if(data.mapSrc) mapImg.src = data.mapSrc;
                
                const w = data.mapWidth || 1200;
                const h = data.mapHeight || 800;
                mapImg.style.width = w + 'px';
                mapImg.style.height = h + 'px';
                lightingCanvas.width = w; lightingCanvas.height = h;
                rulerCanvas.width = w; rulerCanvas.height = h;
                
                walls = data.walls ? Object.values(data.walls) : [];
                lights = data.lights ? Object.values(data.lights) : [];
                updateLightingSystem();
            });

            database.ref(`sessions/${roomId}/tokens`).on('value', s => { renderTokens(s.val()); });

            database.ref(`sessions/${roomId}/chat`).on('value', s => {
                const log = document.getElementById('chat-log'); log.innerHTML = '';
                if(s.exists()) {
                    Object.values(s.val()).forEach(msg => {
                        const el = document.createElement('div'); el.className = 'chat-msg';
                        el.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text}`;
                        log.appendChild(el);
                    });
                    log.scrollTop = log.scrollHeight;
                }
            });
        }

        function updateLightingSystem() {
            const w = lightingCanvas.width; const h = lightingCanvas.height;
            const ctx = lightingCanvas.getContext('2d');
            ctx.clearRect(0,0,w,h);
            
            if (lights.length === 0) return;

            ctx.fillStyle = "rgba(10, 12, 18, 0.92)";
            ctx.fillRect(0, 0, w, h);

            lights.forEach(light => {
                ctx.save();
                let gradient = ctx.createRadialGradient(light.x, light.y, 10, light.x, light.y, light.radius || 250);
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = gradient;
                ctx.beginPath(); ctx.arc(light.x, light.y, light.radius || 250, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });

            if (isHost && walls.length > 0) {
                ctx.save();
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = 'rgba(255, 71, 87, 0.6)'; ctx.lineWidth = 4;
                walls.forEach(wall => {
                    ctx.beginPath(); ctx.moveTo(wall.x1, wall.y1); ctx.lineTo(wall.x2, wall.y2); ctx.stroke();
                });
                ctx.restore();
            }
        }

        function renderTokens(tokensData) {
            tokensContainer.innerHTML = ''; if(!tokensData) return;
            Object.keys(tokensData).forEach(id => {
                const t = tokensData[id]; const size = t.size || 40;
                const el = document.createElement('div'); el.className = `token ${selectedTokenId === id ? 'selected' : ''}`;
                el.style.left = t.x + 'px'; el.style.top = t.y + 'px'; el.style.width = size + 'px'; el.style.height = size + 'px';
                el.style.backgroundImage = `url('${t.img}')`;

                el.innerHTML = `<div class="token-label">${t.name}</div>`;
                if (t.hpMax > 0) {
                    const pct = Math.max(0, Math.min(100, (t.hpVal / t.hpMax) * 100));
                    let hpColor = '#2ed573';
                    if(pct <= 50 && pct > 20) hpColor = '#ffa502';
                    if(pct <= 20) hpColor = '#ff4757';
                    el.innerHTML += `<div class="token-hp-bar"><div class="token-hp-fill" style="width:${pct}%; background:${hpColor};"></div></div>`;
                }

                el.onmousedown = function(e) {
                    if (currentTool !== 'select' || e.button !== 0) return; e.stopPropagation();
                    selectedTokenId = id;
                    let sX = e.clientX; let sY = e.clientY; let oX = t.x; let oY = t.y;
                    document.onmousemove = function(me) {
                        let dx = (me.clientX - sX) / scale; let dy = (me.clientY - sY) / scale;
                        database.ref(`sessions/${roomId}/tokens/${id}`).update({ x: Math.round(oX + dx), y: Math.round(oY + dy) });
                    };
                    document.onmouseup = function() { document.onmousemove = null; document.onmouseup = null; };
                };

                el.oncontextmenu = function(e) {
                    e.preventDefault(); e.stopPropagation(); selectedTokenId = id;
                    contextMenu.style.display = 'block'; contextMenu.style.left = e.clientX + 'px'; contextMenu.style.top = e.clientY + 'px';
                    document.getElementById('ctx-token-name').value = t.name;
                    document.getElementById('ctx-token-size').value = size;
                    document.getElementById('ctx-hp-val').value = t.hpVal || 0;
                    document.getElementById('ctx-hp-max').value = t.hpMax || 0;
                };
                tokensContainer.appendChild(el);
            });
        }

        function initEngineCoreUI() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active'); document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                };
            });

            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active'); currentTool = btn.dataset.tool;
                };
            });

            boardWrapper.onmousedown = function(e) {
                const rect = gameBoard.getBoundingClientRect();
                const mX = (e.clientX - rect.left) / scale; const mY = (e.clientY - rect.top) / scale;

                if (currentTool === 'ruler') {
                    rulerStart = { x: mX, y: mY }; rulerEnd = { x: mX, y: mY };
                } else if (currentTool === 'wall' && isHost) {
                    wallStart = { x: mX, y: mY };
                } else if (currentTool === 'light' && isHost) {
                    database.ref(`sessions/${roomId}/lights`).push({ x: Math.round(mX), y: Math.round(mY), radius: 250 });
                } else if (currentTool === 'select' && e.button === 0) {
                    isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY;
                }
            };

            boardWrapper.onmousemove = function(e) {
                const rect = gameBoard.getBoundingClientRect();
                const mX = (e.clientX - rect.left) / scale; const mY = (e.clientY - rect.top) / scale;

                if (isPanning && currentTool === 'select') {
                    panX = e.clientX - startX; panY = e.clientY - startY;
                    gameBoard.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                }
                if (rulerStart && currentTool === 'ruler') {
                    rulerEnd = { x: mX, y: mY }; drawRuler();
                }
            };

            boardWrapper.onmouseup = function(e) {
                const rect = gameBoard.getBoundingClientRect();
                const mX = (e.clientX - rect.left) / scale; const mY = (e.clientY - rect.top) / scale;

                if (wallStart && currentTool === 'wall' && isHost) {
                    database.ref(`sessions/${roomId}/walls`).push({ x1: Math.round(wallStart.x), y1: Math.round(wallStart.y), x2: Math.round(mX), y2: Math.round(mY) });
                    wallStart = null;
                }
                isPanning = false; rulerStart = null; rulerEnd = null; clearRulerCanvas();
            };

            boardWrapper.onwheel = function(e) {
                e.preventDefault(); const zoom = e.deltaY < 0 ? 1.1 : 0.9;
                scale = Math.max(0.1, Math.min(4, scale * zoom));
                gameBoard.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            };

            document.getElementById('file-map-upload').onchange = function(e) {
                const file = e.target.files[0]; if (!file) return;
                const ref = storage.ref(`rooms/${roomId}/map_${Date.now()}`);
                ref.put(file).then(() => ref.getDownloadURL()).then(url => {
                    database.ref(`sessions/${roomId}`).update({ mapSrc: url });
                });
            };

            document.getElementById('file-token-upload').onchange = function(e) {
                const file = e.target.files[0]; if (!file) return;
                const ref = storage.ref(`rooms/${roomId}/token_${Date.now()}`);
                ref.put(file).then(() => ref.getDownloadURL()).then(url => {
                    database.ref(`sessions/${roomId}/tokens`).push({
                        name: "Новый токен", img: url, x: 150, y: 150, size: 50, hpVal: 10, hpMax: 10
                    });
                });
            };

            document.querySelectorAll('.spawn-token-btn').forEach(b => {
                b.onclick = () => {
                    database.ref(`sessions/${roomId}/tokens`).push({
                        name: b.dataset.name, img: b.dataset.img, x: 100, y: 100, size: 40, hpVal: 10, hpMax: 10
                    });
                };
            });

            document.getElementById('btn-clear-walls').onclick = () => {
                database.ref(`sessions/${roomId}/walls`).remove();
                database.ref(`sessions/${roomId}/lights`).remove();
            };

            document.getElementById('btn-clear-chat').onclick = () => { database.ref(`sessions/${roomId}/chat`).remove(); };

            if (isHost) {
                document.getElementById('btn-save-map-settings').onclick = () => {
                    database.ref(`sessions/${roomId}`).update({
                        mapWidth: parseInt(document.getElementById('input-map-w').value) || 1200,
                        mapHeight: parseInt(document.getElementById('input-map-h').value) || 800
                    });
                };
            }

            document.querySelectorAll('.d-btn').forEach(b => {
                b.onclick = () => {
                    const d = parseInt(b.dataset.dice); const r = Math.floor(Math.random() * d) + 1;
                    database.ref(`sessions/${roomId}/chat`).push({ sender: userName, text: `Бросок D${d}: 🎲 <strong>${r}</strong>` });
                };
            });

            const cInput = document.getElementById('chat-input');
            cInput.onkeydown = function(e) {
                if(e.key === 'Enter' && cInput.value.trim()) {
                    database.ref(`sessions/${roomId}/chat`).push({ sender: userName, text: cInput.value.trim() });
                    cInput.value = '';
                }
            };

            window.onclick = function() { contextMenu.style.display = 'none'; };
            contextMenu.onclick = function(e) { e.stopPropagation(); };
        }

        // ЛИНЕЙКА: 20 пикселей = 5 футов (4 пикселя на 1 фут)
        function drawRuler() {
            const ctx = rulerCanvas.getContext('2d'); ctx.clearRect(0,0,rulerCanvas.width,rulerCanvas.height);
            ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(rulerStart.x, rulerStart.y); ctx.lineTo(rulerEnd.x, rulerEnd.y); ctx.stroke();
            
            const pixelDist = Math.sqrt(Math.pow(rulerEnd.x - rulerStart.x, 2) + Math.pow(rulerEnd.y - rulerStart.y, 2));
            const feetDist = Math.round((pixelDist / 20) * 5); // 20px = 5ft
            
            ctx.fillStyle = '#fff'; ctx.font = '15px sans-serif';
            ctx.fillText(`${feetDist} фт`, rulerEnd.x + 10, rulerEnd.y - 10);
        }
        function clearRulerCanvas() { const ctx = rulerCanvas.getContext('2d'); ctx.clearRect(0,0,rulerCanvas.width,rulerCanvas.height); }

        document.getElementById('ctx-save-btn').onclick = function() {
            if (!selectedTokenId) return;
            database.ref(`sessions/${roomId}/tokens/${selectedTokenId}`).update({
                name: document.getElementById('ctx-token-name').value,
                size: parseInt(document.getElementById('ctx-token-size').value) || 40,
                hpVal: parseInt(document.getElementById('ctx-hp-val').value) || 0,
                hpMax: parseInt(document.getElementById('ctx-hp-max').value) || 0
            });
            contextMenu.style.display = 'none';
        };

        document.getElementById('ctx-delete-item').onclick = function() {
            if (selectedTokenId) database.ref(`sessions/${roomId}/tokens/${selectedTokenId}`).remove();
            contextMenu.style.display = 'none';
        };
    </script>
</body>
</html>
